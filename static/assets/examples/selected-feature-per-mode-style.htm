<!doctype html>
<html lang="en">
	<head>
		<title>Style Selected Features per Mode</title>
		<meta property="tag" content="style" />
		<meta
			property="og:description"
			content="This example shows how to override styling for individual features in select mode.
            Styling is applied to per-feature per-mode meaning features with the same geometry type but different modes can have differing stylings.
            This will come in handy when multiselection of features is adopted in Terra Draw."
		/>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" />
		<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
		<style>
			body {
				margin: 0;
				padding: 0;
			}
			html,
			body,
			#map {
				height: 100%;
			}
		</style>
	</head>
	<body>
		<script src="https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw@latest/dist/maplibre-gl-terradraw.umd.js"></script>
		<script src="https://unpkg.com/terra-draw@1.24.0/dist/terra-draw.umd.js"></script>

		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/@watergis/maplibre-gl-terradraw@latest/dist/maplibre-gl-terradraw.css"
		/>
		<div id="map"></div>

		<script>
			const map = new maplibregl.Map({
				container: 'map',
				style: 'https://demotiles.maplibre.org/style.json',
				center: [0, 0],
				zoom: 1,
				maxPitch: 85
			});

			const drawControl = new MaplibreTerradrawControl.MaplibreTerradrawControl({
				modes: [
					'point',
					'marker',
					'polygon',
					'freehand',
					'circle',
					'rectangle',
					'select',
					'delete'
				],
				open: true,
				// style selected polygons features as follows:
				// 1. freehand fill orange, red outline
				// 2. circle green for both fill and outline,
				// 3. rectangle light purple fill and dark purple outline
				// see this official guide how to customise style using functions
				// https://github.com/JamesLMilner/terra-draw/blob/main/guides/5.STYLING.md#styling-specific-features
				modeOptions: {
					select: new terraDraw.TerraDrawSelectMode({
						styles: {
							selectedPolygonColor({ properties }) {
								if (properties.mode === 'freehand') return '#ff6b00';
								if (properties.mode === 'circle') return '#22c55e';
								if (properties.mode === 'rectangle') return '#a855f7';
							},
							selectedPolygonOutlineColor({ properties }) {
								if (properties.mode === 'freehand') return '#ea580c';
								if (properties.mode === 'circle') return '#16a34a';
								if (properties.mode === 'rectangle') return '#7c3aed';
							},
							selectedPolygonFillOpacity: 0.7,

							// Points - point orange fill, black outline
							selectedPointColor: ({ properties }) => {
								console.log(`Point: ${properties}`);
								if (properties.mode === 'point') return '#f59e0b';
							},

							selectedPointOutlineColor: ({ properties }) => {
								if (properties.mode === 'point') return '#000000';
							},

							selectedPointOutlineWidth: ({ properties }) => {
								if (properties.mode === 'point') return 2;
							},

							selectedPointWidth: ({ properties }) => {
								if (properties.mode === 'point') return 6;
							},

							selectedMarkerHeight: (feature) => {
								console.log(feature.properties);
								return 10;
							}
						}
					})
				}
			});

			map.addControl(drawControl, 'top-left');
		</script>
	</body>
</html>
